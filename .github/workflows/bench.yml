name: bench

# Runs the offline perf harness (bench/) and compares it against the committed
# baseline (bench/results/ci-baseline.json), so performance regressions show up
# in PRs. See docs/PERF.md and bench/README.md.
#
#  * pull_request  -> run + compare to baseline (gates once the baseline is real)
#  * push: master  -> run + REGENERATE the committed baseline (CI-hardware truth)
#  * workflow_dispatch -> run, optionally regenerate the baseline
#
# The baseline must be generated on a CI runner to be comparable; the seed file
# committed alongside this workflow is flagged `placeholder: true` and treated as
# advisory-only until the first master run (or a manual "Update baseline" dispatch)
# replaces it.

on:
  pull_request:
    paths:
      - 'bench/**'
      - 'src/Physics/**'
      - 'lib/commonlibsf/**'
      - '.github/workflows/bench.yml'
  push:
    branches: [master]
    paths:
      - 'bench/**'
      - 'src/Physics/**'
      - '.github/workflows/bench.yml'
  workflow_dispatch:
    inputs:
      update_baseline:
        description: 'Refresh the committed baseline + record a trend data point'
        type: boolean
        default: false

permissions:
  contents: write

# The build/compare job is keyed per-ref and may cancel superseded runs freely.
# The gh-pages publish job below uses its OWN serialized group instead (see
# publish-trend.concurrency) so Pages deployments never overlap or get killed
# mid-push -- an interrupted gh-pages push is what wedges the built-in
# "pages build and deployment" workflow ("deployment in progress" errors).
concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned so runs are comparable across runners (fixed thread count especially).
  BENCH_ARGS: --batches 150 --frames 1500 --reg-frames 4000 --skeletons 128 --tracked 1 --threads 4

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true  # lib/commonlibsf headers (non-recursive: no nested shared lib)

      - name: Toolchain info
        run: |
          g++ --version | head -1
          python3 --version

      - name: Build (baseline + optimized)
        working-directory: bench
        run: |
          make CONFIG=release
          make CONFIG=avx2

      - name: Run harness
        working-directory: bench
        run: |
          ./build/bench-release $BENCH_ARGS --json --label ci-current > current.json
          ./build/bench-avx2    $BENCH_ARGS --json --label ci-opt     > opt.json
          ./build/bench-release $BENCH_ARGS  # human-readable to the log

      - name: Compare to baseline
        working-directory: bench
        run: |
          python3 compare.py \
            --baseline results/ci-baseline.json \
            --current current.json \
            --opt opt.json \
            --threshold 25 --gate

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: |
            bench/current.json
            bench/opt.json

  # --- historical trend: append to the time series on gh-pages + render charts ---
  # Split into its own job so it can serialize on a dedicated, NON-cancelling
  # concurrency group. The gh-pages push triggers GitHub's built-in
  # "pages build and deployment" workflow, which only allows ONE active Pages
  # deployment at a time. Overlapping master pushes used to stack deployments and
  # wedge one "in progress", failing every later deploy ("please cancel ... first").
  # Serializing here -- and never cancelling a publish mid-push -- prevents that.
  # Only runs on master (one authoritative point per merge) or a manual publish, so
  # PR / feature-branch numbers never pollute the master trend.
  publish-trend:
    needs: bench
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.update_baseline)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: pages-deploy        # global across runs: serialize all gh-pages pushes
      cancel-in-progress: false  # never kill a publish mid-push -- that wedges Pages
    steps:
      - uses: actions/checkout@v4

      - name: Download bench results
        uses: actions/download-artifact@v4
        with:
          name: bench-results
          path: bench

      - name: Convert results for trend
        run: python3 bench/to_gha.py --input bench/current.json --output bench/gha.json

      - name: Record trend (github-action-benchmark)
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: OSF Body Physics
          tool: customSmallerIsBetter
          output-file-path: bench/gha.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true                 # creates gh-pages on first run, then appends
          benchmark-data-dir-path: dev/bench
          # The hard PR gate is compare.py; here we only alert on a clear (1.5x)
          # trend regression as a commit comment — never fail (it would be redundant
          # and noisier than compare.py's stable-metric gate).
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false

      - name: Refresh committed baseline
        working-directory: bench
        run: |
          python3 - <<'PY'
          import json
          cur = json.load(open("current.json"))
          out = {"label": "ci-baseline",
                 "_note": "Regenerated by .github/workflows/bench.yml on CI hardware. "
                          "Params: %s" % "${{ env.BENCH_ARGS }}",
                 "results": cur["results"]}
          json.dump(out, open("results/ci-baseline.json", "w"), indent=2)
          open("results/ci-baseline.json", "a").write("\n")
          PY
          if git diff --quiet -- results/ci-baseline.json; then
            echo "baseline unchanged"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add results/ci-baseline.json
            git commit -m "chore(bench): refresh CI baseline [skip ci]"
            git push
          fi
